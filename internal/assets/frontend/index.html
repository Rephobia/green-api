<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Test Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-green-700 mb-8 text-center">GREEN API Тестовое задание</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-8">
                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-xl font-semibold mb-4">Параметры инстанса</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">idInstance</label>
                            <input id="idInstance" type="text" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500"
                                   placeholder="123456789">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ApiTokenInstance</label>
                            <input id="apiToken" type="text" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500"
                                   placeholder="ваш_токен">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow space-y-3">
                    <button onclick="getSettings()" 
                            class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-medium">
                        getSettings
                    </button>
                    <button onclick="getStateInstance()" 
                            class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-medium">
                        getStateInstance
                    </button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow">
                    <h3 class="font-semibold mb-4">Отправить сообщение (sendMessage)</h3>
                    <div class="space-y-4">
                        <input id="chatIdMsg" type="text" placeholder="79123456789@c.us" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <textarea id="messageText" rows="3" placeholder="Текст сообщения..."
                                  class="w-full px-4 py-3 border border-gray-300 rounded-lg"></textarea>
                        <button onclick="sendMessage()" 
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium">
                            sendMessage
                        </button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow">
                    <h3 class="font-semibold mb-4">Отправить файл по URL (sendFileByUrl)</h3>
                    <div class="space-y-4">
                        <input id="chatIdFile" type="text" placeholder="79123456789@c.us" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <input id="urlFile" type="text" placeholder="https://example.com/image.jpg" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <input id="fileName" type="text" placeholder="Имя файла" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <input id="caption" type="text" placeholder="Подпись к файлу (опционально)" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <button onclick="sendFileByUrl()" 
                                class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-medium">
                            sendFileByUrl
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow flex flex-col">
                <div class="p-6 border-b">
                    <h2 class="text-xl font-semibold">Ответ от GREEN-API</h2>
                </div>
                <pre id="response" class="flex-1 p-6 bg-gray-900 text-green-400 font-mono text-sm overflow-auto whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
